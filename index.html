<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감정과 욕구 찾기</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --primary-blue: #003366;
            --accent-blue: #007AFF;
            --light-blue: #EBF4FF;
            --danger-red: #FF3B30;
            --bg-gray: #F2F5F8;
        }
        body { margin: 0; background: var(--bg-gray); font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; color: #333; }
        .header { padding: 30px 20px 5px; text-align: center; font-weight: 800; font-size: 24px; color: var(--primary-blue); }
        .header-desc { font-size: 12px; text-align: center; color: #667; margin-bottom: 20px; line-height: 1.6; padding: 0 25px; }

        .admin-section { background: white; margin: 10px 15px 20px; padding: 18px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .manage-row { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #DDD; }
        .manage-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        .label { font-size: 13px; font-weight: 800; color: var(--primary-blue); margin-bottom: 4px; display: block; }
        .input-group { display: flex; gap: 6px; }
        input[type="text"], select { flex: 1; padding: 11px; border: 1.5px solid #DDE4EE; border-radius: 10px; font-size: 14px; outline: none; background: white; }
        
        .btn { padding: 10px 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; white-space: nowrap; }
        .btn-add { background: var(--accent-blue); color: white; }
        .btn-del { background: var(--danger-red); color: white; }

        #mainTitle { width: 100%; box-sizing: border-box; margin-top: 10px; padding: 14px; font-size: 20px; font-weight: 800; text-align: center; border: 2px solid var(--accent-blue); border-radius: 12px; color: var(--primary-blue); background: white; }

        .container { padding: 0 15px; }
        .card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 18px; box-shadow: 0 5px 12px rgba(0,0,0,0.04); border-top: 5px solid var(--accent-blue); }
        .card-title { font-size: 16px; font-weight: 700; color: var(--primary-blue); margin-bottom: 6px; }
        .card-desc { font-size: 12px; color: #8E8E93; margin-bottom: 14px; line-height: 1.4; }
        
        textarea {
            width: 100%; box-sizing: border-box; min-height: 80px; border: none; outline: none; resize: none;
            font-size: 16px; background: var(--light-blue); padding: 14px; border-radius: 12px; font-weight: 500;
            line-height: 1.6; color: #2c3e50;
        }

        .bottom-btns { display: flex; gap: 10px; padding: 20px 15px 60px; }
        .bottom-btns button { flex: 1; padding: 18px; border-radius: 15px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; }
        .btn-clear { background: #E5E5EA; color: #333; }
        .btn-image { background: var(--primary-blue); color: white; }

        #previewBox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; z-index: 1000; padding: 20px; }
        #previewImg { max-width: 100%; max-height: 80%; border-radius: 12px; }
        #closeBtn { margin-top: 20px; padding: 12px 40px; background: white; border-radius: 25px; font-weight: 600; }
    </style>
</head>
<body>

<div id="capture">
    <div class="header">감정과 욕구 찾기</div>
    <div class="header-desc">내면의 목소리에 귀를 기울이는 시간입니다.</div>

    <div class="admin-section" id="adminPanel">
        <div class="manage-row">
            <span class="label">1. 사용자 선택</span>
            <div class="input-group">
                <input type="text" id="newUserName" placeholder="새 이름 등록">
                <button class="btn btn-add" onclick="addUser()">등록</button>
            </div>
            <div class="input-group" style="margin-top:5px;">
                <select id="userSelect" onchange="changeUser()"></select>
                <button class="btn btn-del" onclick="deleteUser()">삭제</button>
            </div>
        </div>

        <div class="manage-row">
            <span class="label">2. 사건 선택</span>
            <div class="input-group">
                <input type="text" id="newEventName" placeholder="새 사건명 등록">
                <button class="btn btn-add" onclick="addEvent()">추가</button>
            </div>
            <div class="input-group" style="margin-top:5px;">
                <select id="eventSelect" onchange="syncTitleAndLoad()"></select>
                <button class="btn btn-del" onclick="deleteEvent()">삭제</button>
            </div>
        </div>
    </div>

    <div style="padding: 0 15px 10px;">
        <input type="text" id="mainTitle" placeholder="제목">
    </div>

    <div class="container">
        <div class="card"><div class="card-title">1. 사건 인식</div><div class="card-desc">사실만을 나열하세요</div><textarea id="step1"></textarea></div>
        <div class="card"><div class="card-title">2. 감정 찾기</div><div class="card-desc">느껴지는 감정들을 기록하세요</div><textarea id="step2"></textarea></div>
        <div class="card"><div class="card-title">3. 감정 밑 생각</div><div class="card-desc">이 감정을 만든 생각은?</div><textarea id="step3"></textarea></div>
        <div class="card"><div class="card-title">4. 핵심 욕구</div><div class="card-desc">충족하고 싶었던 긍정적 의도</div><textarea id="step4"></textarea></div>
        <div class="card"><div class="card-title">5. 욕구 강화</div><div class="card-desc">이것이 왜 나에게 중요한가요?</div><textarea id="step5"></textarea></div>
        <div class="card"><div class="card-title">6. 구체적 행동</div><div class="card-desc">나를 돕기 위한 실천 3가지</div><textarea id="step6"></textarea></div>
    </div>
</div>

<div class="bottom-btns">
    <button class="btn-clear" onclick="clearInputs()">내용 비우기</button>
    <button class="btn-image" onclick="makeImage()">이미지 공유</button>
</div>

<div id="previewBox">
    <img id="previewImg"><div id="closeBtn" onclick="closePreview()">닫기</div>
</div>

<script>
function getStorageKey() {
    const u = document.getElementById("userSelect").value || "guest";
    const e = document.getElementById("eventSelect").value || "default";
    return `mindApp_${u}_${e}`;
}

// 사용자 관리
function addUser() {
    const name = document.getElementById("newUserName").value.trim();
    if(!name) return;
    let users = JSON.parse(localStorage.getItem("mindUsers") || "[]");
    if(users.includes(name)) return alert("이미 존재합니다.");
    users.push(name);
    localStorage.setItem("mindUsers", JSON.stringify(users));
    document.getElementById("newUserName").value = "";
    renderUserList(name);
}

function deleteUser() {
    const name = document.getElementById("userSelect").value;
    if(!name || !confirm("사용자를 삭제할까요?")) return;
    let users = JSON.parse(localStorage.getItem("mindUsers") || "[]").filter(u => u !== name);
    localStorage.setItem("mindUsers", JSON.stringify(users));
    renderUserList();
}

function renderUserList(selectName) {
    const select = document.getElementById("userSelect");
    const users = JSON.parse(localStorage.getItem("mindUsers") || "[]");
    select.innerHTML = users.length ? "" : "<option value=''>사용자 없음</option>";
    users.forEach(u => {
        const opt = document.createElement("option");
        opt.value = u; opt.innerText = u;
        select.appendChild(opt);
    });
    if(selectName) select.value = selectName;
    else if(localStorage.getItem("lastUser")) select.value = localStorage.getItem("lastUser");
    changeUser();
}

function changeUser() {
    const user = document.getElementById("userSelect").value;
    localStorage.setItem("lastUser", user);
    renderEventList();
}

// 사건 관리
function addEvent() {
    const user = document.getElementById("userSelect").value;
    const event = document.getElementById("newEventName").value.trim();
    if(!user || !event) return alert("내용을 입력하세요.");
    let events = JSON.parse(localStorage.getItem(`events_${user}`) || "[]");
    if(events.includes(event)) return alert("이미 존재합니다.");
    events.push(event);
    localStorage.setItem(`events_${user}`, JSON.stringify(events));
    document.getElementById("newEventName").value = "";
    renderEventList(event);
}

function deleteEvent() {
    const user = document.getElementById("userSelect").value;
    const event = document.getElementById("eventSelect").value;
    if(!event || !confirm("삭제할까요?")) return;
    let events = JSON.parse(localStorage.getItem(`events_${user}`) || "[]").filter(e => e !== event);
    localStorage.setItem(`events_${user}`, JSON.stringify(events));
    renderEventList();
}

function renderEventList(selectEvent) {
    const user = document.getElementById("userSelect").value;
    const select = document.getElementById("eventSelect");
    const events = JSON.parse(localStorage.getItem(`events_${user}`) || "[]");
    select.innerHTML = events.length ? "" : "<option value=''>사건 없음</option>";
    events.forEach(e => {
        const opt = document.createElement("option");
        opt.value = e; opt.innerText = e;
        select.appendChild(opt);
    });
    if(selectEvent) select.value = selectEvent;
    syncTitleAndLoad();
}

// 핵심 기능: 사건명을 제목으로 동기화 후 데이터 로드
function syncTitleAndLoad() {
    const eventName = document.getElementById("eventSelect").value;
    const titleInput = document.getElementById("mainTitle");
    
    // 저장된 제목이 없으면 사건명으로 자동 세팅
    const key = getStorageKey();
    const savedTitle = localStorage.getItem(key + "_title");
    titleInput.value = savedTitle ? savedTitle : (eventName || "");
    
    if(!savedTitle && eventName) {
        localStorage.setItem(key + "_title", eventName);
    }
    loadContents();
}

function loadContents() {
    const key = getStorageKey();
    for(let i=1; i<=6; i++) {
        const ta = document.getElementById("step" + i);
        ta.value = localStorage.getItem(key + "_step" + i) || "";
        autoResize(ta);
    }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
}

window.onload = function() {
    renderUserList();
    document.getElementById("mainTitle").addEventListener("input", function() {
        localStorage.setItem(getStorageKey() + "_title", this.value);
    });
    for(let i=1; i<=6; i++) {
        const ta = document.getElementById("step" + i);
        ta.addEventListener("input", function() {
            localStorage.setItem(getStorageKey() + "_step" + i, this.value);
            autoResize(this);
        });
    }
}

function clearInputs() {
    if(confirm("내용을 비울까요?")) {
        for(let i=1; i<=6; i++) {
            document.getElementById("step"+i).value = "";
            autoResize(document.getElementById("step"+i));
        }
    }
}

async function makeImage() {
    const captureArea = document.getElementById("capture");
    const canvas = await html2canvas(captureArea, {
        scale: 2,
        backgroundColor: "#F2F5F8",
        onclone: (clonedDoc) => {
            // [이미지 최적화] 관리자 패널(이름/사건 선택창) 숨기기
            clonedDoc.getElementById('adminPanel').style.display = 'none';
            
            // 제목 스타일 변환
            const titleInput = clonedDoc.getElementById('mainTitle');
            const div = clonedDoc.createElement('div');
            div.innerText = titleInput.value || "나의 마음 탐구";
            div.style.cssText = "font-size:24px; font-weight:800; color:#003366; text-align:center; margin:10px 0 20px;";
            titleInput.parentNode.replaceChild(div, titleInput);

            // 입력차(Textarea)를 Div로 변환하여 텍스트 그대로 노출
            clonedDoc.querySelectorAll('textarea').forEach(ta => {
                const d = clonedDoc.createElement('div');
                d.innerText = ta.value;
                d.style.cssText = "background:#EBF4FF; padding:15px; border-radius:12px; font-size:15px; line-height:1.6; white-space:pre-wrap; color:#333;";
                ta.parentNode.replaceChild(d, ta);
            });
        }
    });

    canvas.toBlob(async (blob) => {
        const file = new File([blob], "mind_diary.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ files: [file], title: '감정과 욕구 찾기' });
            } catch (err) { if (err.name !== 'AbortError') showFallback(canvas); }
        } else { showFallback(canvas); }
    });
}

function showFallback(canvas) {
    document.getElementById("previewImg").src = canvas.toDataURL("image/png");
    document.getElementById("previewBox").style.display = "flex";
}
function closePreview() { document.getElementById("previewBox").style.display = "none"; }
</script>
</body>
</html>
